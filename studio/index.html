<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deadman Studio · 生产侧</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --line: #e7e9ee;
    --line-soft: #eef0f4;
    --ink: #181b22;
    --sub: #5d6470;
    --faint: #939aa6;
    --brand: #3b5bdb;
    --brand-soft: #eef1fe;
    --radius: 16px;
    --radius-sm: 11px;

    --ok: #1f9d57;      --ok-bg: #e8f6ee;
    --info: #2b6fe0;    --info-bg: #e9f1fd;
    --warn: #c67c0a;    --warn-bg: #fbf1de;
    --violet: #6b4ef0;  --violet-bg: #eee9fd;
    --danger: #d4453f;  --danger-bg: #fbeceb;
    --muted: #8a909c;   --muted-bg: #eef0f3;

    --shadow: 0 1px 2px rgba(20,25,40,.04), 0 6px 18px rgba(20,25,40,.05);
    --shadow-sm: 0 1px 2px rgba(20,25,40,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
      "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    font-size: 14px; line-height: 1.5;
  }
  .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
  #root { height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .loading, .detail-empty { color: var(--faint); padding: 40px; font-size: 14px; }

  /* ---------- layout ---------- */
  .app { display: grid; grid-template-columns: 272px 1fr; height: 100vh; }
  .rail {
    background: var(--panel); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 18px 14px; gap: 16px;
    overflow: hidden;
  }
  .main { overflow-y: auto; padding: 28px 34px 80px; }

  /* ---------- brand ---------- */
  .brand { display: flex; align-items: center; gap: 11px; padding: 4px 6px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px; flex: none;
    background: var(--ink); color: #fff; font-weight: 700; font-size: 18px;
    display: grid; place-items: center; letter-spacing: -1px;
  }
  .brand-name { font-weight: 650; font-size: 15px; letter-spacing: -.2px; }
  .brand-sub { font-size: 11.5px; color: var(--faint); margin-top: 1px; }

  /* ---------- nav ---------- */
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-btn {
    display: flex; align-items: center; gap: 9px; padding: 9px 11px;
    border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 550;
    color: var(--sub); text-align: left; position: relative;
  }
  .nav-btn .nav-ico { font-size: 13px; color: var(--faint); width: 16px; text-align: center; }
  .nav-btn .nav-en { color: var(--faint); font-size: 11px; font-weight: 500; margin-left: 2px; }
  .nav-btn:hover { background: var(--line-soft); }
  .nav-btn.is-active { background: var(--brand-soft); color: var(--brand); }
  .nav-btn.is-active .nav-ico { color: var(--brand); }
  .nav-btn:disabled { opacity: .45; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: none; }
  .nav-badge {
    margin-left: auto; background: var(--warn); color: #fff; font-size: 11px;
    font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px;
    display: grid; place-items: center; padding: 0 5px;
  }

  .rail-label { font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: .06em; padding: 0 6px; }
  .runs-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .run-row {
    text-align: left; padding: 10px 11px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--panel);
  }
  .run-row:hover { border-color: #d4d8e0; background: #fcfcfd; }
  .run-row.is-active { border-color: var(--brand); background: var(--brand-soft); }
  .rr-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .rr-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 140px; }
  .rr-id { font-size: 10.5px; color: var(--faint); margin-top: 4px; }

  .rail-foot { font-size: 10.5px; color: var(--faint); padding: 8px 6px 0;
    border-top: 1px solid var(--line-soft); }
  .rf-line { line-height: 1.7; }
  .rf-line.dim { color: #b3b9c3; }
  .dim { color: var(--faint); }

  /* new-run button */
  .newrun-btn { display: flex; align-items: center; justify-content: center; gap: 7px;
    background: var(--brand); color: #fff; font-size: 13.5px; font-weight: 650;
    padding: 10px 12px; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }
  .newrun-btn:hover { background: #2f4cc4; }
  .newrun-btn.is-active { box-shadow: 0 0 0 3px var(--brand-soft); }
  .nr-plus { font-size: 15px; font-weight: 700; line-height: 1; }

  /* artifacts (clean producer-facing names) */
  .artifact-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .artifact { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
    font-weight: 550; color: var(--sub); background: #f6f8fb; border: 1px solid var(--line);
    padding: 5px 11px; border-radius: 8px; }
  .artifact-ico { color: var(--faint); font-size: 11px; }

  /* technical details disclosure */
  .tech-toggle { margin-top: 18px; font-size: 12px; font-weight: 600; color: var(--faint);
    padding: 2px 0; }
  .tech-toggle:hover { color: var(--sub); }
  .tech-body { margin-top: 12px; padding-top: 14px; border-top: 1px dashed var(--line); }

  /* ---------- pills / chips ---------- */
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
    font-weight: 600; padding: 3px 9px 3px 8px; border-radius: 999px; white-space: nowrap; }
  .pill-lg { font-size: 12.5px; padding: 4px 11px 4px 9px; }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill.tone-ok { color: var(--ok); background: var(--ok-bg); }
  .pill.tone-info { color: var(--info); background: var(--info-bg); }
  .pill.tone-warn { color: var(--warn); background: var(--warn-bg); }
  .pill.tone-violet { color: var(--violet); background: var(--violet-bg); }
  .pill.tone-danger { color: var(--danger); background: var(--danger-bg); }
  .pill.tone-muted { color: var(--muted); background: var(--muted-bg); }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .chip { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 600;
    padding: 2.5px 8px; border-radius: 7px; background: var(--muted-bg); color: var(--sub);
    white-space: nowrap; }
  .mode-llm { background: var(--violet-bg); color: var(--violet); }
  .mode-base { background: var(--muted-bg); color: var(--sub); }

  /* ---------- run head (shared) ---------- */
  .run-head, .review-head { display: flex; justify-content: space-between;
    align-items: flex-start; gap: 18px; margin-bottom: 22px; flex-wrap: wrap; }
  .run-title-row { display: flex; align-items: center; gap: 11px; }
  .run-title { font-size: 21px; font-weight: 680; letter-spacing: -.3px; }
  .run-id { font-size: 12px; color: var(--faint); margin-top: 6px; }
  .run-meta, .review-counts { display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding-top: 4px; }
  .meta-item { font-size: 12.5px; color: var(--sub); }
  .meta-item b { color: var(--ink); font-weight: 680; }

  /* ---------- monitor body ---------- */
  .monitor-body { display: grid; grid-template-columns: 1fr 420px; gap: 22px; align-items: start; }
  .monitor-right { position: sticky; top: 0; }

  /* pipeline */
  .pipeline { display: flex; flex-direction: column; gap: 18px; }
  .phase { }
  .phase-label { font-size: 11px; font-weight: 700; color: var(--faint);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 9px; }
  .phase-nodes { display: flex; flex-direction: column; gap: 7px; position: relative; }

  .node-card {
    display: flex; align-items: center; gap: 11px; text-align: left;
    padding: 12px 13px; border-radius: var(--radius-sm); border: 1px solid var(--line);
    background: var(--panel); box-shadow: var(--shadow-sm); transition: border-color .12s, transform .05s;
    position: relative;
  }
  .node-card:hover { border-color: #d2d7e0; }
  .node-card.is-selected { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .node-card.is-current { border-color: var(--info); }
  .node-card.is-gate { background: linear-gradient(0deg, #fffdf7, #fff); }
  .node-card.is-gate.is-selected { border-color: var(--warn); box-shadow: 0 0 0 3px var(--warn-bg); }
  .node-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .node-dot.tone-ok { background: var(--ok); }
  .node-dot.tone-info { background: var(--info); }
  .node-dot.tone-warn { background: var(--warn); }
  .node-dot.tone-violet { background: var(--violet); }
  .node-dot.tone-danger { background: var(--danger); }
  .node-dot.tone-muted { background: #c8cdd6; }
  .node-body { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .node-zh { font-size: 13.5px; font-weight: 600; }
  .node-en { font-size: 11px; color: var(--faint); }
  .node-tag { font-size: 9.5px; font-weight: 700; color: var(--violet); background: var(--violet-bg);
    padding: 2px 5px; border-radius: 5px; letter-spacing: .03em; }
  .node-card.is-llm .node-zh { color: #4a3fb0; }

  /* node detail */
  .detail { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px; }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .detail-zh { font-size: 16px; font-weight: 680; }
  .detail-en { font-size: 11.5px; color: var(--faint); margin-top: 2px; }
  .detail-purpose { font-size: 13px; color: var(--sub); line-height: 1.65; margin: 14px 0; }
  .detail-row { display: flex; align-items: center; gap: 8px; padding: 9px 11px;
    background: var(--brand-soft); border-radius: 9px; }
  .detail-k { font-size: 11px; font-weight: 700; color: var(--faint);
    text-transform: uppercase; letter-spacing: .04em; }
  .detail-k.mt { margin: 16px 0 7px; display: block; }
  .detail-authority { font-size: 12.5px; font-weight: 650; color: var(--brand); }
  .detail-cta { margin-top: 14px; width: 100%; }

  .detail-error { margin-top: 14px; background: var(--danger-bg); border: 1px solid #f3c9c6;
    border-radius: 10px; padding: 12px; }
  .err-code { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; color: var(--danger); }
  .err-msg { font-size: 12.5px; color: #8a3531; margin-top: 5px; line-height: 1.55; }
  .err-ref { font-family: ui-monospace, monospace; font-size: 11px; color: #a8645f; margin-top: 5px; }

  .codeblock { background: #1a1e27; color: #d7dce6; border-radius: 10px; padding: 13px 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word; overflow-x: auto; }
  .codeblock { --kw: #8ab4ff; }
  .path-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .path-list li { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--sub);
    padding-left: 14px; position: relative; word-break: break-all; }
  .path-list li::before { content: "→"; position: absolute; left: 0; color: var(--faint); }
  .fail-codes { display: flex; flex-wrap: wrap; gap: 6px; }
  .fail-codes code { font-size: 11px; background: var(--muted-bg); color: var(--sub);
    padding: 3px 8px; border-radius: 6px; font-family: ui-monospace, monospace; }

  /* final report */
  .report-card { margin-top: 22px; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
  .report-head { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 650;
    color: var(--sub); padding: 11px 16px; border-bottom: 1px solid var(--line-soft);
    background: #fafbfc; }
  .report-body { padding: 16px 18px; font-size: 12.5px; line-height: 1.75; color: var(--sub);
    white-space: pre-wrap; font-family: ui-monospace, monospace; }

  /* ---------- review gate ---------- */
  .review { padding-bottom: 90px; }
  .review-instructions { background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 15px 18px; margin-bottom: 18px; }
  .ri-item { font-size: 12.5px; color: var(--sub); line-height: 1.7; }
  .ri-paths { font-size: 11px; color: var(--brand); margin-top: 8px; word-break: break-all; }

  .review-toolbar { display: flex; justify-content: space-between; align-items: center;
    gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .filters { display: flex; gap: 5px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 3px; }
  .filter { font-size: 12.5px; font-weight: 550; color: var(--sub); padding: 6px 13px; border-radius: 7px; }
  .filter:hover { background: var(--line-soft); }
  .filter.is-active { background: var(--ink); color: #fff; }
  .bulk { display: flex; gap: 14px; }
  .link-btn { font-size: 12.5px; font-weight: 600; color: var(--brand); }
  .link-btn:hover { text-decoration: underline; }

  .cand-list { display: flex; flex-direction: column; gap: 11px; }
  .cand { display: flex; gap: 14px; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 16px 18px;
    transition: border-color .12s, opacity .12s; }
  .cand.is-kept { border-left: 3px solid var(--ok); }
  .cand.is-dropped { opacity: .62; border-left: 3px solid var(--line); }
  .cand.is-dropped:hover { opacity: .9; }

  .cand-check { position: relative; flex: none; padding-top: 2px; }
  .cand-check input { position: absolute; opacity: 0; width: 22px; height: 22px; cursor: pointer; }
  .checkbox-box { display: block; width: 22px; height: 22px; border-radius: 7px;
    border: 2px solid #cfd4dd; transition: all .12s; }
  .cand-check input:checked + .checkbox-box { background: var(--ok); border-color: var(--ok); }
  .cand-check input:checked + .checkbox-box::after { content: "✓"; color: #fff; font-size: 14px;
    font-weight: 800; display: grid; place-items: center; height: 100%; margin-top: -1px; }

  .cand-main { flex: 1; min-width: 0; }
  .cand-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 9px; }
  .cand-ep { font-size: 12px; font-weight: 650; color: var(--ink); }
  .cand-win { font-size: 11.5px; color: var(--faint); white-space: nowrap; }
  .at-system_rule { background: #eaf0ff; color: #2f55c8; }
  .at-resource { background: #e8f5ec; color: #1f8a4d; }
  .at-humiliation { background: #fdeceb; color: #c43d39; }
  .at-relationship { background: #fbf1de; color: #b3760a; }
  .src-det { background: var(--muted-bg); color: var(--sub); }
  .src-enr { background: #eef1fe; color: #4458c4; }
  .src-llm { background: var(--violet-bg); color: var(--violet); }
  .judge-rec { background: var(--ok-bg); color: var(--ok); }
  .judge-keep { background: var(--warn-bg); color: var(--warn); }
  .judge-rej { background: var(--danger-bg); color: var(--danger); }
  .grade { font-size: 11px; font-weight: 600; color: var(--faint); margin-left: auto; }
  .grade-high { color: var(--ok); }
  .grade-medium { color: var(--warn); }
  .grade-low { color: var(--danger); }

  .cand-hook { font-size: 15.5px; font-weight: 650; letter-spacing: -.2px; line-height: 1.45; }
  .cand-impulse { font-size: 13px; color: var(--sub); margin-top: 4px; }
  .cand-failmode { font-size: 11.5px; color: var(--danger); margin-top: 8px; font-weight: 550;
    background: var(--danger-bg); display: inline-block; padding: 4px 9px; border-radius: 7px; }

  .cand-foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    margin-top: 13px; flex-wrap: wrap; }
  .cand-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 18px; flex: 1; min-width: 260px; }
  .score { display: flex; align-items: center; gap: 7px; }
  .score-k { font-size: 11px; color: var(--faint); width: 52px; flex: none; }
  .score-track { flex: 1; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .score-fill { display: block; height: 100%; background: var(--brand); border-radius: 3px; }
  .score-v { font-size: 11px; color: var(--sub); width: 18px; text-align: right; font-weight: 600; }
  .cand-expand { font-size: 12px; font-weight: 600; color: var(--brand); white-space: nowrap; }
  .cand-expand:hover { text-decoration: underline; }

  .cand-detail { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .cd-k { font-size: 10.5px; font-weight: 700; color: var(--faint); text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 6px; }
  .cd-k:not(:first-child) { margin-top: 13px; }
  .cd-options { padding-left: 18px; display: flex; flex-direction: column; gap: 4px; }
  .cd-options li { font-size: 12.5px; color: var(--sub); }
  .cd-excerpt { font-size: 12.5px; color: var(--ink); line-height: 1.65; background: #fafbfc;
    border-left: 3px solid var(--line); padding: 9px 12px; border-radius: 0 8px 8px 0; }
  .cd-note { font-size: 12.5px; color: var(--sub); line-height: 1.6; }

  .cand-empty { color: var(--faint); padding: 30px; text-align: center; }

  /* review bar */
  .review-bar { position: fixed; bottom: 0; left: 272px; right: 0;
    background: rgba(255,255,255,.92); backdrop-filter: blur(10px);
    border-top: 1px solid var(--line); padding: 13px 34px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px; z-index: 20; }
  .rb-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
  .rb-count { font-size: 13.5px; white-space: nowrap; }
  .rb-count b { font-size: 16px; color: var(--ok); }
  .rb-note { flex: 1; max-width: 360px; font-size: 13px; padding: 8px 12px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--panel); font-family: inherit; }
  .rb-note:focus { outline: none; border-color: var(--brand); }
  .rb-actions { display: flex; align-items: center; gap: 10px; }
  .rb-confirm { font-size: 12px; color: var(--danger); font-weight: 550; }

  .btn { font-size: 13.5px; font-weight: 650; padding: 9px 17px; border-radius: 10px; transition: all .12s; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:not(:disabled):hover { background: #2f4cc4; }
  .btn-ghost { background: var(--panel); border: 1px solid var(--line); color: var(--sub); }
  .btn-ghost:not(:disabled):hover { border-color: #c9cdd6; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:not(:disabled):hover { background: #bd3a35; }

  /* review-none */
  .review-none { display: grid; place-items: center; height: 60vh; }
  .review-none-card { text-align: center; max-width: 440px; }
  .rn-title { font-size: 16px; font-weight: 650; }
  .rn-sub { font-size: 13px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
  .rn-sub code, .rn-title code { font-family: ui-monospace, monospace; font-size: 12px;
    background: var(--muted-bg); padding: 1px 6px; border-radius: 5px; }

  /* toast */
  .toast { position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; font-size: 13.5px; font-weight: 550;
    padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(20,25,40,.25);
    z-index: 50; animation: toastIn .3s cubic-bezier(.2,.8,.2,1); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } }

  /* ---------- new run ---------- */
  .newrun { max-width: 720px; }
  .nr-head { margin-bottom: 22px; }
  .nr-sub { font-size: 13px; color: var(--sub); margin-top: 6px; }
  .nr-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); padding: 18px 20px; margin-bottom: 16px; }
  .nr-card-title { font-size: 12.5px; font-weight: 700; color: var(--ink); margin-bottom: 14px;
    display: flex; align-items: center; gap: 9px; }
  .nr-count { font-size: 11.5px; font-weight: 600; color: var(--brand); background: var(--brand-soft);
    padding: 2px 9px; border-radius: 999px; }

  .nr-fields { display: flex; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .field-narrow { flex: 0 0 200px; }
  .field-k { font-size: 11.5px; font-weight: 600; color: var(--sub); }
  .field-in { font-family: inherit; font-size: 13.5px; padding: 9px 12px; border-radius: 9px;
    border: 1px solid var(--line); background: #fcfcfd; color: var(--ink); }
